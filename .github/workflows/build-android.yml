name: Build - Android

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - '.idea/**'
      - '.gitattributes'
      - '.github/**.json'
      - '.gitignore'
      - '.gitmodules'
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || 'no-pr' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-common:
    name: Build - Common code
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show disk usage
        uses: ./.github/actions/disk-usage

      - name: Cleanup disk
        uses: ./.github/actions/disk-cleanup

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle
        with:
          write-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Prime configuration and dependency cache
        run: ./gradlew --no-daemon help

      - name: Assemble common
        run: ./gradlew :app-common:assemble

      - name: Show disk usage
        uses: ./.github/actions/disk-usage

  build-k9:
    name: Build - K9 application
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Build K9 application
        run: ./gradlew :app-k9mail:assemble -Pci=true -PGEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Upload K9 APKs
        uses: actions/upload-artifact@v4
        with:
          name: k9-apks
          path: app-k9mail/build/outputs/apk/**/*.apk

  check-badging-k9:
    name: Check - K9 badging
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Check K9 Badging
        run: |
          ./gradlew :app-k9mail:checkFossReleaseBadging \
                    :app-k9mail:checkFullReleaseBadging \
                    -x assemble \
                    -x build

  build-thunderbird:
    name: Build - Thunderbird application
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Build Thunderbird application
        run: ./gradlew :app-thunderbird:assemble -Pci=true -PGEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Upload Thunderbird APKs
        uses: actions/upload-artifact@v4
        with:
          name: thunderbird-apks
          path: app-thunderbird/build/outputs/apk/**/*.apk

  check-badging-thunderbird:
    name: Check - Thunderbird badging
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Check Thunderbird Badging
        run: |
          ./gradlew :app-thunderbird:checkFossBetaBadging \
                    :app-thunderbird:checkFossDailyBadging \
                    :app-thunderbird:checkFossReleaseBadging \
                    :app-thunderbird:checkFullBetaBadging \
                    :app-thunderbird:checkFullDailyBadging \
                    :app-thunderbird:checkFullReleaseBadging \
                    -x assemble \
                    -x build

  build-ui-catalog:
    name: Build - UI-catalog application
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Build App UI-catalog application in Debug mode
        run: ./gradlew :app-ui-catalog:assembleDebug

      - name: Upload UI Catalog APK
        uses: actions/upload-artifact@v4
        with:
          name: ui-catalog-apk
          path: app-ui-catalog/build/outputs/apk/**/*.apk

  quality-unit-test:
    name: Quality - Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Running unit tests
        run: ./gradlew testsOnCi --parallel -PGEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

  quality-lint:
    name: Quality - Lint
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [build-common]
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Gradle environment
        uses: ./.github/actions/setup-gradle

      - name: Running Android lint
        run: ./gradlew lint
